<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="醫事人員執業異動文字產生器 — 快速產生醫事人員執業登記、停業、復業、歇業等異動申請文字。">
    <!-- Security: Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none';">
    <!-- Security: Prevent MIME type sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <!-- Security: Control referrer information leakage -->
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>醫事人員執業異動文字產生器</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <!-- PWA: Web App Manifest -->
    <link rel="manifest" href="manifest.json">
    <!-- PWA: Theme color -->
    <meta name="theme-color" content="#0d9488">
    <!-- PWA: Apple 裝置支援 -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="異動產生器">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="fonts.css">
    <style>
        /* ═══════════════════════════════════════
           Design System
           ═══════════════════════════════════════ */
        :root {
            --c-primary: #0d9488;
            --c-primary-light: #14b8a6;
            --c-primary-lighter: #5eead4;
            --c-primary-subtle: #ccfbf1;
            --c-primary-bg: #f0fdfa;
            --c-primary-900: #134e4a;

            --c-surface: #ffffff;
            --c-surface-raised: #ffffff;
            --c-surface-sunken: #f8fafc;
            --c-surface-overlay: rgba(255,255,255,0.82);

            --c-border: #e2e8f0;
            --c-border-light: #f1f5f9;
            --c-border-focus: var(--c-primary);

            --c-text: #1e293b;
            --c-text-secondary: #64748b;
            --c-text-tertiary: #94a3b8;
            --c-text-inverse: #ffffff;

            --c-success: #10b981;
            --c-success-bg: #ecfdf5;
            --c-error: #ef4444;
            --c-error-bg: #fef2f2;

            --font: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
            --font-mono: 'SF Mono', 'Fira Code', monospace;

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;

            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.08);
            --shadow-glow: 0 0 0 3px rgba(13,148,136,0.12);
            --shadow-glow-lg: 0 0 24px rgba(13,148,136,0.15);

            --ease: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --dur: 200ms;
            --dur-slow: 350ms;
        }

        /* ═══════════════════════════════════════
           Reset
           ═══════════════════════════════════════ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { line-height: 1.5; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
        body { font-family: var(--font); color: var(--c-text); background: var(--c-surface-sunken); min-height: 100dvh; overflow-x: hidden; }
        button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
        input { font: inherit; border: none; outline: none; background: none; }
        :focus-visible { outline: 2px solid var(--c-primary); outline-offset: 2px; }
        button:focus:not(:focus-visible), input:focus:not(:focus-visible) { outline: none; }

        /* ═══════════════════════════════════════
           Subtle Background
           ═══════════════════════════════════════ */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background:
                radial-gradient(ellipse 70% 50% at 15% 5%, rgba(13,148,136,0.05) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 85% 90%, rgba(13,148,136,0.04) 0%, transparent 60%);
        }

        /* ═══════════════════════════════════════
           App Shell
           ═══════════════════════════════════════ */
        .app-header {
            position: sticky; top: 0; z-index: 100;
            background: var(--c-surface-overlay);
            backdrop-filter: blur(16px) saturate(1.5);
            -webkit-backdrop-filter: blur(16px) saturate(1.5);
            border-bottom: 1px solid var(--c-border-light);
            padding: 0.75rem 1rem;
            display: flex; align-items: center; justify-content: space-between;
            gap: 0.75rem;
        }

        .header-brand {
            display: flex; align-items: center; gap: 0.6rem;
            min-width: 0;
        }

        .header-logo {
            width: 32px; height: 32px; border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--c-primary), var(--c-primary-light));
            display: flex; align-items: center; justify-content: center;
            color: white; flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(13,148,136,0.25);
        }

        .header-title {
            font-size: 0.95rem; font-weight: 700; color: var(--c-text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            letter-spacing: -0.01em;
        }

        .header-actions {
            display: flex; align-items: center; gap: 0.35rem; flex-shrink: 0;
        }

        .icon-btn {
            width: 36px; height: 36px; border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            color: var(--c-text-secondary);
            transition: all var(--dur) var(--ease);
            position: relative;
        }

        .icon-btn:hover { background: var(--c-surface-sunken); color: var(--c-text); }
        .icon-btn:active { transform: scale(0.92); }

        .icon-btn .badge {
            position: absolute; top: 4px; right: 4px;
            min-width: 14px; height: 14px; padding: 0 3px;
            border-radius: var(--radius-full);
            background: var(--c-primary);
            color: white; font-size: 0.55rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            transform: scale(0);
            transition: transform var(--dur) var(--ease-bounce);
        }

        .icon-btn .badge.visible { transform: scale(1); }

        /* ═══════════════════════════════════════
           Two-Column Layout
           ═══════════════════════════════════════ */
        .app-layout {
            max-width: 1120px;
            margin: 0 auto;
            padding: 1.25rem 1rem 6.5rem;
            display: flex;
            gap: 1.25rem;
            align-items: flex-start;
        }

        .col-input { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1rem; }

        .col-preview {
            width: 340px; flex-shrink: 0;
            position: sticky; top: 72px;
            display: flex; flex-direction: column; gap: 1rem;
        }

        /* ═══════════════════════════════════════
           Cards
           ═══════════════════════════════════════ */
        .card {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: box-shadow var(--dur) var(--ease);
        }

        .card:hover { box-shadow: var(--shadow-md); }

        .card-header {
            padding: 0.85rem 1rem 0;
            display: flex; align-items: center; justify-content: space-between;
        }

        .card-label {
            display: flex; align-items: center; gap: 0.5rem;
        }

        .card-label-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--c-text-tertiary);
            transition: all var(--dur-slow) var(--ease);
            flex-shrink: 0;
        }

        .card-label-dot.active { background: var(--c-primary); box-shadow: 0 0 6px rgba(13,148,136,0.4); }
        .card-label-dot.completed { background: var(--c-success); box-shadow: 0 0 6px rgba(16,185,129,0.4); }

        .card-label-text {
            font-size: 0.78rem; font-weight: 600; color: var(--c-text-secondary);
            text-transform: uppercase; letter-spacing: 0.06em;
        }

        .card-badge {
            font-size: 0.65rem; font-weight: 600;
            padding: 0.15rem 0.45rem;
            border-radius: var(--radius-full);
            background: var(--c-primary-bg);
            color: var(--c-primary);
        }

        .card-body { padding: 0.75rem 1rem 1rem; }

        /* ═══════════════════════════════════════
           Name Input
           ═══════════════════════════════════════ */
        .name-field {
            position: relative;
        }

        .name-input {
            width: 100%;
            padding: 0.7rem 2.8rem 0.7rem 0.85rem;
            font-size: 0.9rem; font-weight: 500;
            color: var(--c-text);
            background: var(--c-surface-sunken);
            border: 1.5px solid var(--c-border);
            border-radius: var(--radius-md);
            transition: all var(--dur) var(--ease);
        }

        .name-input::placeholder { color: var(--c-text-tertiary); font-weight: 400; }
        .name-input:hover { border-color: var(--c-text-tertiary); }
        .name-input:focus { border-color: var(--c-primary); box-shadow: var(--shadow-glow); background: var(--c-surface); }

        .name-clear {
            position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--c-text-tertiary);
            opacity: 0; pointer-events: none;
            transition: all var(--dur) var(--ease);
        }

        .name-clear.visible { opacity: 1; pointer-events: auto; }
        .name-clear:hover { background: var(--c-border-light); color: var(--c-text-secondary); }

        /* Recent names dropdown */
        .name-suggestions {
            position: absolute; top: 100%; left: 0; right: 0;
            margin-top: 4px; z-index: 50;
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            display: none;
        }

        .name-suggestions.open { display: block; }

        .name-suggestion-item {
            width: 100%;
            padding: 0.55rem 0.85rem;
            font-size: 0.82rem; text-align: left;
            color: var(--c-text);
            display: flex; align-items: center; justify-content: space-between;
            transition: background var(--dur);
        }

        .name-suggestion-item:hover { background: var(--c-surface-sunken); }
        .name-suggestion-item:not(:last-child) { border-bottom: 1px solid var(--c-border-light); }

        .name-suggestion-item .hint {
            font-size: 0.68rem; color: var(--c-text-tertiary);
        }

        /* ═══════════════════════════════════════
           Category Tabs & Grid
           ═══════════════════════════════════════ */
        .tabs-scroll {
            display: flex; gap: 4px;
            overflow-x: auto; padding-bottom: 0.5rem;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
        }

        .tabs-scroll::-webkit-scrollbar { display: none; }

        .tab-pill {
            flex-shrink: 0;
            padding: 0.35rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.75rem; font-weight: 600;
            color: var(--c-text-tertiary);
            background: transparent;
            border: 1.5px solid transparent;
            transition: all var(--dur) var(--ease);
            white-space: nowrap;
            scroll-snap-align: start;
        }

        .tab-pill:hover { color: var(--c-text-secondary); background: var(--c-surface-sunken); }
        .tab-pill.active {
            color: var(--c-primary);
            background: var(--c-primary-bg);
            border-color: rgba(13,148,136,0.15);
        }

        .cat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        @media (min-width: 640px) { .cat-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 900px) { .cat-grid { grid-template-columns: repeat(4, 1fr); } }

        .cat-btn {
            padding: 0.55rem 0.4rem;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--c-border);
            background: var(--c-surface);
            color: var(--c-text-secondary);
            font-size: 0.8rem; font-weight: 500;
            text-align: center;
            transition: all var(--dur) var(--ease);
            cursor: pointer;
            position: relative;
        }

        .cat-btn:hover {
            border-color: var(--c-primary-lighter);
            color: var(--c-text);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .cat-btn:active { transform: translateY(0) scale(0.97); }

        .cat-btn.selected {
            border-color: var(--c-primary);
            background: var(--c-primary-bg);
            color: var(--c-primary-900);
            font-weight: 700;
            box-shadow: var(--shadow-glow);
        }

        /* ═══════════════════════════════════════
           Item Chips
           ═══════════════════════════════════════ */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        @media (min-width: 640px) { .items-grid { grid-template-columns: repeat(3, 1fr); } }

        .item-chip {
            display: flex; align-items: center; justify-content: center; gap: 0.35rem;
            padding: 0.6rem 0.4rem;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--c-border);
            background: var(--c-surface);
            color: var(--c-text-secondary);
            font-size: 0.8rem; font-weight: 500;
            cursor: pointer;
            transition: all var(--dur) var(--ease);
            user-select: none;
        }

        .item-chip:hover {
            border-color: var(--c-text-tertiary);
            color: var(--c-text);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .item-chip:active { transform: translateY(0) scale(0.97); }

        .item-chip.selected {
            border-color: var(--c-primary);
            background: var(--c-primary-bg);
            color: var(--c-primary-900);
            font-weight: 700;
            box-shadow: var(--shadow-glow);
        }

        .check-dot {
            width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0;
            background: var(--c-primary);
            color: white;
            display: flex; align-items: center; justify-content: center;
            transform: scale(0);
            transition: transform var(--dur) var(--ease-bounce);
        }

        .item-chip.selected .check-dot { transform: scale(1); }

        .check-dot svg { width: 10px; height: 10px; }

        .item-count-badge {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 18px; height: 18px; padding: 0 4px;
            border-radius: var(--radius-full);
            background: var(--c-primary);
            color: white; font-size: 0.6rem; font-weight: 700;
            transform: scale(0);
            transition: transform var(--dur) var(--ease-bounce);
        }

        .item-count-badge.visible { transform: scale(1); }

        /* ═══════════════════════════════════════
           Preview Card (Desktop Sidebar)
           ═══════════════════════════════════════ */
        .preview-card {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .preview-header {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--c-border-light);
            display: flex; align-items: center; justify-content: space-between;
        }

        .preview-label {
            font-size: 0.75rem; font-weight: 600;
            color: var(--c-text-secondary);
            text-transform: uppercase; letter-spacing: 0.06em;
        }

        .preview-status {
            font-size: 0.65rem; font-weight: 600;
            padding: 0.15rem 0.5rem;
            border-radius: var(--radius-full);
            transition: all var(--dur-slow);
        }

        .preview-status.incomplete { background: var(--c-surface-sunken); color: var(--c-text-tertiary); }
        .preview-status.ready { background: var(--c-success-bg); color: var(--c-success); }

        .preview-body {
            padding: 1rem;
        }

        .preview-result {
            background: var(--c-surface-sunken);
            border: 1px solid var(--c-border-light);
            border-radius: var(--radius-md);
            padding: 1rem;
            min-height: 3.5rem;
            display: flex; align-items: center;
            margin-bottom: 0.75rem;
        }

        .preview-result-text {
            font-size: 0.95rem; font-weight: 600;
            color: var(--c-text);
            word-break: break-all;
            line-height: 1.6;
            transition: color var(--dur);
        }

        .preview-result-text.placeholder { color: var(--c-text-tertiary); font-weight: 400; }

        .copy-btn {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            font-size: 0.85rem; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            transition: all var(--dur) var(--ease);
            position: relative; overflow: hidden;
        }

        .copy-btn.primary {
            background: var(--c-primary);
            color: white;
            box-shadow: 0 2px 8px rgba(13,148,136,0.25);
        }

        .copy-btn.primary:hover {
            background: var(--c-primary-light);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(13,148,136,0.3);
        }

        .copy-btn.primary:active { transform: translateY(0) scale(0.98); }

        .copy-btn.primary:disabled {
            background: var(--c-border);
            color: var(--c-text-tertiary);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .copy-btn .ripple {
            position: absolute; border-radius: 50%;
            background: rgba(255,255,255,0.25);
            transform: scale(0); animation: ripple 0.5s ease-out;
            pointer-events: none;
        }

        @keyframes ripple { to { transform: scale(3); opacity: 0; } }

        .copy-btn svg { width: 16px; height: 16px; }

        .shortcut-hint {
            font-size: 0.65rem; font-weight: 500;
            color: var(--c-text-tertiary);
            margin-top: 0.5rem;
            text-align: center;
            display: flex; align-items: center; justify-content: center; gap: 0.25rem;
        }

        .key-badge {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 0.1rem 0.35rem;
            border-radius: 4px;
            background: var(--c-surface-sunken);
            border: 1px solid var(--c-border);
            font-size: 0.6rem; font-weight: 600;
            color: var(--c-text-secondary);
            line-height: 1;
        }

        /* ═══════════════════════════════════════
           History Panel
           ═══════════════════════════════════════ */
        .history-card {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .history-header {
            padding: 0.7rem 1rem;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer;
            transition: background var(--dur);
        }

        .history-header:hover { background: var(--c-surface-sunken); }

        .history-label {
            font-size: 0.72rem; font-weight: 600;
            color: var(--c-text-tertiary);
            text-transform: uppercase; letter-spacing: 0.06em;
            display: flex; align-items: center; gap: 0.35rem;
        }

        .history-toggle {
            width: 20px; height: 20px;
            color: var(--c-text-tertiary);
            transition: transform var(--dur) var(--ease);
        }

        .history-toggle.open { transform: rotate(180deg); }

        .history-body {
            max-height: 0; overflow: hidden;
            transition: max-height var(--dur-slow) var(--ease);
        }

        .history-body.open { max-height: 400px; }

        .history-list { padding: 0 0.5rem 0.5rem; }

        .history-item {
            width: 100%;
            padding: 0.5rem 0.6rem;
            border-radius: var(--radius-sm);
            font-size: 0.75rem; font-weight: 400;
            color: var(--c-text-secondary);
            text-align: left;
            word-break: break-all;
            display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem;
            transition: all var(--dur);
            line-height: 1.5;
        }

        .history-item:hover { background: var(--c-surface-sunken); color: var(--c-text); }

        .history-item-text { flex: 1; min-width: 0; }

        .history-item-copy {
            flex-shrink: 0; width: 24px; height: 24px;
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            color: var(--c-text-tertiary);
            opacity: 0;
            transition: all var(--dur);
        }

        .history-item:hover .history-item-copy { opacity: 1; }
        .history-item-copy:hover { background: var(--c-border-light); color: var(--c-primary); }
        .history-item-copy svg { width: 13px; height: 13px; }

        .history-empty {
            padding: 1rem 0.6rem;
            font-size: 0.75rem;
            color: var(--c-text-tertiary);
            text-align: center;
        }

        .history-clear-btn {
            font-size: 0.65rem; font-weight: 500;
            color: var(--c-text-tertiary);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            transition: all var(--dur);
        }

        .history-clear-btn:hover { color: var(--c-error); background: var(--c-error-bg); }

        /* ═══════════════════════════════════════
           Mobile Sticky Bottom Bar
           ═══════════════════════════════════════ */
        .mobile-bar {
            display: none;
            position: fixed; bottom: 0; left: 0; right: 0;
            z-index: 100;
            background: var(--c-surface-overlay);
            backdrop-filter: blur(16px) saturate(1.5);
            -webkit-backdrop-filter: blur(16px) saturate(1.5);
            border-top: 1px solid var(--c-border-light);
            padding: 0.65rem 1rem calc(0.65rem + env(safe-area-inset-bottom, 0px));
        }

        .mobile-bar-preview {
            font-size: 0.78rem; font-weight: 500;
            color: var(--c-text-secondary);
            margin-bottom: 0.5rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            line-height: 1.4;
        }

        .mobile-bar-preview strong { color: var(--c-text); font-weight: 600; }

        .mobile-copy-btn {
            width: 100%;
            padding: 0.7rem;
            border-radius: var(--radius-md);
            background: var(--c-primary);
            color: white;
            font-size: 0.85rem; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            transition: all var(--dur) var(--ease);
            box-shadow: 0 2px 8px rgba(13,148,136,0.25);
        }

        .mobile-copy-btn:hover { background: var(--c-primary-light); }
        .mobile-copy-btn:active { transform: scale(0.98); }
        .mobile-copy-btn:disabled { background: var(--c-border); color: var(--c-text-tertiary); box-shadow: none; }
        .mobile-copy-btn svg { width: 16px; height: 16px; }

        /* ═══════════════════════════════════════
           Toast
           ═══════════════════════════════════════ */
        .toast {
            position: fixed; top: 0.75rem; left: 50%;
            transform: translateX(-50%) translateY(-120%) scale(0.95);
            z-index: 9999; max-width: 420px; width: calc(100% - 2rem);
            pointer-events: none;
            transition: all var(--dur-slow) var(--ease);
            opacity: 0;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0) scale(1);
            opacity: 1; pointer-events: auto;
        }

        .toast-inner {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.65rem 1rem;
            border-radius: var(--radius-md);
            font-size: 0.82rem; font-weight: 500;
            box-shadow: var(--shadow-lg);
            position: relative; overflow: hidden;
        }

        .toast-inner.success {
            background: var(--c-surface); color: var(--c-text);
            border: 1px solid var(--c-border);
        }

        .toast-inner.error {
            background: var(--c-error-bg); color: #991b1b;
            border: 1px solid rgba(239,68,68,0.2);
        }

        .toast-icon { width: 18px; height: 18px; flex-shrink: 0; }
        .toast-icon.success { color: var(--c-success); }
        .toast-icon.error { color: var(--c-error); }

        .toast-bar {
            position: absolute; bottom: 0; left: 0;
            height: 2px; border-radius: 0 0 var(--radius-md) var(--radius-md);
        }

        .toast-bar.success { background: var(--c-primary); }
        .toast-bar.error { background: var(--c-error); }

        /* ═══════════════════════════════════════
           Responsive
           ═══════════════════════════════════════ */
        @media (max-width: 799px) {
            .col-preview { display: none; }
            .mobile-bar { display: block; }
            .app-layout { padding-bottom: 8.5rem; }
        }

        @media (min-width: 800px) {
            .mobile-bar { display: none; }
            .col-preview { display: flex; }
        }

        /* ═══════════════════════════════════════
           Entrance Animations
           ═══════════════════════════════════════ */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .anim-in { animation: fadeUp 0.45s var(--ease) both; }
        .anim-in-1 { animation-delay: 0.05s; }
        .anim-in-2 { animation-delay: 0.12s; }
        .anim-in-3 { animation-delay: 0.19s; }
        .anim-in-4 { animation-delay: 0.26s; }

        /* ═══════════════════════════════════════
           PWA Install Button
           ═══════════════════════════════════════ */
        .install-btn {
            display: none;
            align-items: center; gap: 0.35rem;
            padding: 0.35rem 0.7rem;
            border-radius: var(--radius-full);
            font-size: 0.72rem; font-weight: 600;
            color: var(--c-primary);
            background: var(--c-primary-bg);
            border: 1.5px solid rgba(13,148,136,0.15);
            transition: all var(--dur) var(--ease);
            white-space: nowrap;
            cursor: pointer;
        }
        .install-btn:hover {
            background: var(--c-primary-subtle);
            border-color: var(--c-primary-lighter);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }
        .install-btn:active { transform: translateY(0) scale(0.96); }
        .install-btn.visible { display: flex; }
        .install-btn svg { width: 14px; height: 14px; }
    </style>
</head>
<body>

    <!-- ═══ Header ═══ -->
    <header class="app-header">
        <div class="header-brand">
            <div class="header-logo">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/>
                    <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
                </svg>
            </div>
            <span class="header-title">醫事人員執業異動文字產生器</span>
        </div>
        <div class="header-actions">
            <!-- PWA: Install button -->
            <button class="install-btn" id="installBtn" onclick="handleInstallClick()" aria-label="安裝應用">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                安裝
            </button>
            <button class="icon-btn" id="historyToggleBtn" onclick="toggleHistoryMobile()" aria-label="複製紀錄">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="12 8 12 12 14 14"/>
                    <circle cx="12" cy="12" r="10"/>
                </svg>
                <span class="badge" id="historyBadge">0</span>
            </button>
            <button class="icon-btn" onclick="resetAll()" aria-label="清除重填">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 019-9 9.75 9.75 0 016.74 2.74L21 8"/>
                    <path d="M21 3v5h-5"/>
                    <path d="M21 12a9 9 0 01-9 9 9.75 9.75 0 01-6.74-2.74L3 16"/>
                    <path d="M3 21v-5h5"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- ═══ Main Layout ═══ -->
    <div class="app-layout">

        <!-- Left: Input Column -->
        <div class="col-input">

            <!-- Card: Name -->
            <div class="card anim-in anim-in-1" aria-label="輸入申請人姓名">
                <div class="card-header">
                    <div class="card-label">
                        <span class="card-label-dot active" id="dot1"></span>
                        <span class="card-label-text">申請人姓名</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="name-field">
                        <input type="text" id="applicantName" class="name-input"
                            placeholder="輸入姓名，例如：陳小明"
                            autocomplete="off"
                            maxlength="50"
                            aria-label="申請人姓名"
                            oninput="handleNameInput()"
                            onfocus="showNameSuggestions()"
                            onblur="delayHideSuggestions()">
                        <button class="name-clear" id="nameClear" onclick="clearName()" aria-label="清除姓名">
                            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round">
                                <path d="M18 6L6 18M6 6l12 12"/>
                            </svg>
                        </button>
                        <div class="name-suggestions" id="nameSuggestions"></div>
                    </div>
                </div>
            </div>

            <!-- Card: Category -->
            <div class="card anim-in anim-in-2" aria-label="選擇申請類別">
                <div class="card-header">
                    <div class="card-label">
                        <span class="card-label-dot" id="dot2"></span>
                        <span class="card-label-text">申請類別</span>
                    </div>
                    <span class="card-badge">單選</span>
                </div>
                <div class="card-body">
                    <div id="categoryContainer"></div>
                </div>
            </div>

            <!-- Card: Items -->
            <div class="card anim-in anim-in-3" aria-label="選擇申請項目">
                <div class="card-header">
                    <div class="card-label">
                        <span class="card-label-dot" id="dot3"></span>
                        <span class="card-label-text">申請項目</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:0.35rem;">
                        <span class="card-badge">複選</span>
                        <span class="item-count-badge" id="itemCountBadge">0</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="items-grid" id="itemGrid"></div>
                </div>
            </div>

        </div>

        <!-- Right: Preview & History (Desktop) -->
        <div class="col-preview anim-in anim-in-4">

            <!-- Preview -->
            <div class="preview-card">
                <div class="preview-header">
                    <span class="preview-label">產生結果</span>
                    <span class="preview-status incomplete" id="previewStatus">未完成</span>
                </div>
                <div class="preview-body">
                    <div class="preview-result">
                        <p class="preview-result-text placeholder" id="outputResult">請依序填寫左側欄位</p>
                    </div>
                    <button class="copy-btn primary" id="desktopCopyBtn" onclick="copyGeneratedText()">
                        <svg id="copyIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2"/>
                            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                        </svg>
                        <span id="copyBtnText">複製文字</span>
                    </button>
                    <div class="shortcut-hint">
                        <span class="key-badge">Ctrl</span>
                        <span>+</span>
                        <span class="key-badge">Enter</span>
                        <span>快速複製</span>
                    </div>
                </div>
            </div>

            <!-- History -->
            <div class="history-card">
                <div class="history-header" onclick="toggleHistory()">
                    <span class="history-label">
                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><polyline points="12 8 12 12 14 14"/><circle cx="12" cy="12" r="10"/></svg>
                        複製紀錄
                    </span>
                    <div style="display:flex;align-items:center;gap:0.35rem;">
                        <button class="history-clear-btn" id="historyClearBtn" onclick="event.stopPropagation();clearHistory()" style="display:none;">清除</button>
                        <svg class="history-toggle" id="historyChevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                </div>
                <div class="history-body" id="historyBody">
                    <div class="history-list" id="historyList">
                        <div class="history-empty">尚無複製紀錄</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- ═══ Mobile Sticky Bar ═══ -->
    <div class="mobile-bar">
        <div class="mobile-bar-preview" id="mobilePreview">請填寫上方欄位</div>
        <button class="mobile-copy-btn" id="mobileCopyBtn" onclick="copyGeneratedText()">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2"/>
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
            <span id="mobileCopyText">複製文字</span>
        </button>
    </div>

    <!-- ═══ Toast ═══ -->
    <div class="toast" id="toastEl" role="alert" aria-live="polite">
        <div class="toast-inner success" id="toastInner">
            <svg class="toast-icon success" id="toastIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
            </svg>
            <span id="toastContent"></span>
            <div class="toast-bar success" id="toastBar" style="width:100%"></div>
        </div>
    </div>

    <script>
    // ═══════════════════════════════════════════════════
    // DATA
    // ═══════════════════════════════════════════════════
    const categories = [
        { id: 'physician', label: '醫師', group: '醫師類' },
        { id: 'tcm_physician', label: '中醫師', group: '醫師類' },
        { id: 'dentist', label: '牙醫師', group: '醫師類' },
        { id: 'nurse', label: '護理師(護士)', group: '護理與助產類' },
        { id: 'midwife', label: '助產師(士)', group: '護理與助產類' },
        { id: 'pharmacist', label: '藥師', group: '藥事類' },
        { id: 'assistant_pharmacist', label: '藥劑生', group: '藥事類' },
        { id: 'medical_technologist', label: '醫事檢驗師(生)', group: '醫事技術類' },
        { id: 'medical_radiation', label: '醫事放射師(士)', group: '醫事技術類' },
        { id: 'dental_technologist', label: '牙體技術師(生)', group: '醫事技術類' },
        { id: 'optometrist', label: '驗光師(生)', group: '醫事技術類' },
        { id: 'physical_therapist', label: '物理治療師(生)', group: '復健與治療類' },
        { id: 'occupational_therapist', label: '職能治療師(生)', group: '復健與治療類' },
        { id: 'speech_therapist', label: '語言治療師', group: '復健與治療類' },
        { id: 'audiologist', label: '聽力師', group: '復健與治療類' },
        { id: 'respiratory_therapist', label: '呼吸治療師', group: '復健與治療類' },
        { id: 'clinical_psychologist', label: '臨床心理師', group: '心理類' },
        { id: 'counseling_psychologist', label: '諮商心理師', group: '心理類' },
        { id: 'nutritionist', label: '營養師', group: '藥事類' },
        { id: 'other', label: '其他', group: '其他專業類' }
    ];

    const items = [
        { id: 'register', label: '執業(現歇業)登記' },
        { id: 'suspend', label: '停業登記' },
        { id: 'resume', label: '復業(現停業)登記' },
        { id: 'cessation', label: '歇業(離職)登記' },
        { id: 'dept_change', label: '(科別)變更' },
        { id: 'name_change', label: '(姓名)變更' },
        { id: 'inst_change', label: '機構變更' },
        { id: 'cat_change', label: '類別變更' },
        { id: 'lost_reissue', label: '遺失補發' },
        { id: 'damage_reissue', label: '損壞補發' },
        { id: 'renew', label: '到期換發' }
    ];

    // ═══════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════
    let selectedCategory = '';
    let selectedItems = [];
    let selectedGroupTab = '';
    let copyHistory = [];
    let recentNames = [];
    let historyOpen = false;

    const STORAGE_KEYS = {
        history: 'medgen_history',
        names: 'medgen_names',
    };

    // ═══════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════
    window.onload = function() {
        loadStorage();
        renderCategories();
        renderItems();
        updateGenerator();
        updateDots();
        renderHistory();
        updateHistoryBadge();
    };

    // Keyboard shortcut: Ctrl+Enter to copy
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            e.preventDefault();
            copyGeneratedText();
        }
    });

    // ═══════════════════════════════════════════════════
    // LOCAL STORAGE
    // ═══════════════════════════════════════════════════
    // Security fix: validate data structure from localStorage to prevent injection
    function loadStorage() {
        try {
            const h = localStorage.getItem(STORAGE_KEYS.history);
            if (h) {
                const parsed = JSON.parse(h);
                if (Array.isArray(parsed)) {
                    copyHistory = parsed.filter(item =>
                        item && typeof item === 'object'
                        && typeof item.text === 'string' && item.text.length <= 500
                        && typeof item.time === 'number'
                    ).slice(0, 20);
                }
            }
            const n = localStorage.getItem(STORAGE_KEYS.names);
            if (n) {
                const parsed = JSON.parse(n);
                if (Array.isArray(parsed)) {
                    recentNames = parsed.filter(name =>
                        typeof name === 'string' && name.length <= 50
                    ).slice(0, 8);
                }
            }
        } catch(e) {
            // Security: corrupted data, clear and ignore
            try { localStorage.removeItem(STORAGE_KEYS.history); } catch(_) {}
            try { localStorage.removeItem(STORAGE_KEYS.names); } catch(_) {}
        }
    }

    function saveHistory() {
        try { localStorage.setItem(STORAGE_KEYS.history, JSON.stringify(copyHistory.slice(0, 20))); } catch(e) {}
    }

    function saveNames() {
        try { localStorage.setItem(STORAGE_KEYS.names, JSON.stringify(recentNames.slice(0, 8))); } catch(e) {}
    }

    function addToHistory(text) {
        // Remove duplicate if exists
        copyHistory = copyHistory.filter(h => h.text !== text);
        copyHistory.unshift({ text, time: Date.now() });
        if (copyHistory.length > 20) copyHistory.length = 20;
        saveHistory();
        renderHistory();
        updateHistoryBadge();
    }

    function rememberName(name) {
        if (!name) return;
        recentNames = recentNames.filter(n => n !== name);
        recentNames.unshift(name);
        if (recentNames.length > 8) recentNames.length = 8;
        saveNames();
    }

    // ═══════════════════════════════════════════════════
    // STATUS DOTS
    // ═══════════════════════════════════════════════════
    function updateDots() {
        const name = document.getElementById('applicantName').value.trim();
        const d1 = document.getElementById('dot1');
        const d2 = document.getElementById('dot2');
        const d3 = document.getElementById('dot3');
        const nameClear = document.getElementById('nameClear');
        const statusEl = document.getElementById('previewStatus');
        const countBadge = document.getElementById('itemCountBadge');

        // Dot 1
        d1.className = 'card-label-dot ' + (name ? 'completed' : 'active');
        nameClear.classList.toggle('visible', !!name);

        // Dot 2
        d2.className = 'card-label-dot ' + (selectedCategory ? 'completed' : (name ? 'active' : ''));

        // Dot 3
        d3.className = 'card-label-dot ' + (selectedItems.length > 0 ? 'completed' : (selectedCategory ? 'active' : ''));

        // Item count
        countBadge.textContent = selectedItems.length;
        countBadge.classList.toggle('visible', selectedItems.length > 0);

        // Preview status
        const isReady = name && selectedCategory && selectedItems.length > 0;
        statusEl.className = 'preview-status ' + (isReady ? 'ready' : 'incomplete');
        statusEl.textContent = isReady ? '可複製' : '未完成';

        // Copy button state
        const desktopBtn = document.getElementById('desktopCopyBtn');
        const mobileBtn = document.getElementById('mobileCopyBtn');
        if (desktopBtn) desktopBtn.disabled = !isReady;
        if (mobileBtn) mobileBtn.disabled = !isReady;
    }

    // ═══════════════════════════════════════════════════
    // NAME INPUT
    // ═══════════════════════════════════════════════════
    function handleNameInput() {
        updateGenerator();
        updateDots();
    }

    function clearName() {
        document.getElementById('applicantName').value = '';
        document.getElementById('applicantName').focus();
        handleNameInput();
    }

    // Name suggestions
    function showNameSuggestions() {
        const box = document.getElementById('nameSuggestions');
        if (recentNames.length === 0) { box.classList.remove('open'); return; }
        const current = document.getElementById('applicantName').value.trim();
        // Filter to matching names (or show all if empty)
        const filtered = current
            ? recentNames.filter(n => n.includes(current) && n !== current)
            : recentNames;
        if (filtered.length === 0) { box.classList.remove('open'); return; }

        box.innerHTML = '';
        filtered.forEach(name => {
            const item = document.createElement('button');
            item.type = 'button';
            item.className = 'name-suggestion-item';
            // Security fix: use DOM API instead of innerHTML to prevent XSS from localStorage data
            const nameSpan = document.createElement('span');
            nameSpan.textContent = name;
            const hintSpan = document.createElement('span');
            hintSpan.className = 'hint';
            hintSpan.textContent = '最近使用';
            item.appendChild(nameSpan);
            item.appendChild(hintSpan);
            item.onmousedown = (e) => {
                e.preventDefault(); // prevent blur
                document.getElementById('applicantName').value = name;
                box.classList.remove('open');
                handleNameInput();
            };
            box.appendChild(item);
        });
        box.classList.add('open');
    }

    let suggestHideTimer;
    function delayHideSuggestions() {
        suggestHideTimer = setTimeout(() => {
            document.getElementById('nameSuggestions').classList.remove('open');
        }, 150);
    }

    // ═══════════════════════════════════════════════════
    // CATEGORIES
    // ═══════════════════════════════════════════════════
    function renderCategories() {
        const container = document.getElementById('categoryContainer');
        container.innerHTML = '';

        const groupOrder = [];
        const groups = {};
        categories.forEach(cat => {
            if (!groups[cat.group]) { groups[cat.group] = []; groupOrder.push(cat.group); }
            groups[cat.group].push(cat);
        });

        if (!selectedGroupTab) {
            if (selectedCategory) {
                const sc = categories.find(c => c.id === selectedCategory);
                if (sc) selectedGroupTab = sc.group;
            }
            if (!selectedGroupTab) selectedGroupTab = '全部';
        }

        // Tabs
        const tabRow = document.createElement('div');
        tabRow.className = 'tabs-scroll';

        const allTab = document.createElement('button');
        allTab.type = 'button';
        allTab.className = 'tab-pill' + (selectedGroupTab === '全部' ? ' active' : '');
        allTab.textContent = '全部';
        allTab.onclick = () => { selectedGroupTab = '全部'; renderCategories(); };
        tabRow.appendChild(allTab);

        groupOrder.forEach(g => {
            const tab = document.createElement('button');
            tab.type = 'button';
            tab.className = 'tab-pill' + (selectedGroupTab === g ? ' active' : '');
            tab.textContent = g;
            tab.onclick = () => { selectedGroupTab = g; renderCategories(); };
            tabRow.appendChild(tab);
        });
        container.appendChild(tabRow);

        // Grid
        const grid = document.createElement('div');
        grid.className = 'cat-grid';
        const displayCats = selectedGroupTab === '全部' ? categories : (groups[selectedGroupTab] || []);
        displayCats.forEach(cat => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'cat-btn' + (selectedCategory === cat.id ? ' selected' : '');
            btn.setAttribute('aria-pressed', selectedCategory === cat.id ? 'true' : 'false');
            btn.innerText = cat.label;
            btn.onclick = () => {
                selectedCategory = cat.id;
                selectedItems = [];
                renderCategories();
                renderItems();
                updateGenerator();
                updateDots();
            };
            grid.appendChild(btn);
        });
        container.appendChild(grid);
    }

    // ═══════════════════════════════════════════════════
    // ITEMS
    // ═══════════════════════════════════════════════════
    function renderItems() {
        const grid = document.getElementById('itemGrid');
        grid.innerHTML = '';
        items.forEach(item => {
            const sel = selectedItems.includes(item.id);
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'item-chip' + (sel ? ' selected' : '');
            btn.setAttribute('aria-pressed', sel ? 'true' : 'false');
            btn.onclick = () => toggleItemSelection(item.id);

            const checkSpan = document.createElement('span');
            checkSpan.className = 'check-dot';
            checkSpan.innerHTML = '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>';
            btn.appendChild(checkSpan);

            const label = document.createElement('span');
            label.textContent = item.label;
            btn.appendChild(label);

            grid.appendChild(btn);
        });
    }

    function toggleItemSelection(id) {
        const idx = selectedItems.indexOf(id);
        if (idx > -1) selectedItems.splice(idx, 1);
        else selectedItems.push(id);
        renderItems();
        updateGenerator();
        updateDots();
    }

    // ═══════════════════════════════════════════════════
    // TEXT GENERATION
    // ═══════════════════════════════════════════════════
    function cleanParentheses(text) {
        if (!text) return '';
        if (text.includes('(科別)') || text.includes('（科別）')) return '科別變更';
        if (text.includes('(姓名)') || text.includes('（姓名）')) return '姓名變更';
        return text.replace(/[\(（].*?[\)）]/g, '');
    }

    function updateGenerator() {
        const rawName = document.getElementById('applicantName').value.trim();
        const displayName = rawName || '（請輸入姓名）';
        const categoryObj = categories.find(c => c.id === selectedCategory);
        const cleanedCategory = categoryObj ? cleanParentheses(categoryObj.label) : '（請選擇類別）';
        const cleanedItemsArray = selectedItems.map(id => {
            const obj = items.find(i => i.id === id);
            return obj ? cleanParentheses(obj.label) : '';
        }).filter(Boolean);
        const itemsText = cleanedItemsArray.length > 0 ? cleanedItemsArray.join('、') : '（請選擇項目）';
        const result = `${displayName}申辦${cleanedCategory}${itemsText}`;

        // Desktop preview
        const el = document.getElementById('outputResult');
        const isComplete = rawName && selectedCategory && selectedItems.length > 0;
        el.textContent = isComplete ? result : (rawName || selectedCategory || selectedItems.length > 0 ? result : '請依序填寫左側欄位');
        el.className = 'preview-result-text' + (isComplete ? '' : ' placeholder');

        // Mobile preview
        const mob = document.getElementById('mobilePreview');
        if (isComplete) {
            // Security fix: use DOM API instead of innerHTML to prevent XSS from user input
            mob.innerHTML = '';
            const strong = document.createElement('strong');
            strong.textContent = result;
            mob.appendChild(strong);
        } else {
            mob.textContent = rawName || selectedCategory || selectedItems.length > 0 ? result : '請填寫上方欄位';
        }
    }

    // ═══════════════════════════════════════════════════
    // COPY
    // ═══════════════════════════════════════════════════
    function copyGeneratedText() {
        const rawName = document.getElementById('applicantName').value.trim();
        if (!rawName) { showToast('請先輸入申請人姓名', 'error'); return; }
        if (!selectedCategory) { showToast('請先選擇申請類別', 'error'); return; }
        if (selectedItems.length === 0) { showToast('請至少選擇一個申請項目', 'error'); return; }

        const text = document.getElementById('outputResult').textContent;
        navigator.clipboard.writeText(text).then(() => {
            showToast('已複製：' + text, 'success');
            addToHistory(text);
            rememberName(rawName);
            morphCopyBtn();
        }).catch(() => {
            showToast('複製失敗，請手動選取複製', 'error');
        });
    }

    function morphCopyBtn() {
        const icons = [document.getElementById('copyIcon')];
        const texts = [document.getElementById('copyBtnText'), document.getElementById('mobileCopyText')];
        const origIcon = icons[0].innerHTML;

        icons.forEach(ic => {
            ic.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>';
        });
        texts.forEach(t => { if (t) t.textContent = '已複製！'; });

        setTimeout(() => {
            icons.forEach(ic => { ic.innerHTML = origIcon; });
            texts[0].textContent = '複製文字';
            if (texts[1]) texts[1].textContent = '複製文字';
        }, 1600);
    }

    // Ripple effect
    document.addEventListener('click', function(e) {
        const btn = e.target.closest('.copy-btn, .mobile-copy-btn');
        if (!btn || btn.disabled) return;
        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        const rect = btn.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
        ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
        btn.style.position = 'relative';
        btn.style.overflow = 'hidden';
        btn.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove());
    });

    // ═══════════════════════════════════════════════════
    // RESET
    // ═══════════════════════════════════════════════════
    function resetAll() {
        document.getElementById('applicantName').value = '';
        selectedCategory = '';
        selectedItems = [];
        selectedGroupTab = '';
        renderCategories();
        renderItems();
        updateGenerator();
        updateDots();
        document.getElementById('applicantName').focus();
        showToast('已清除所有選擇', 'success');
    }

    // ═══════════════════════════════════════════════════
    // HISTORY
    // ═══════════════════════════════════════════════════
    function toggleHistory() {
        historyOpen = !historyOpen;
        document.getElementById('historyBody').classList.toggle('open', historyOpen);
        document.getElementById('historyChevron').classList.toggle('open', historyOpen);
    }

    function toggleHistoryMobile() {
        // On mobile, scroll down to show history or toggle if desktop
        toggleHistory();
    }

    function updateHistoryBadge() {
        const badge = document.getElementById('historyBadge');
        badge.textContent = copyHistory.length;
        badge.classList.toggle('visible', copyHistory.length > 0);
        const clearBtn = document.getElementById('historyClearBtn');
        if (clearBtn) clearBtn.style.display = copyHistory.length > 0 ? '' : 'none';
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        if (copyHistory.length === 0) {
            list.innerHTML = '<div class="history-empty">尚無複製紀錄</div>';
            return;
        }

        list.innerHTML = '';
        copyHistory.forEach((entry, idx) => {
            const item = document.createElement('button');
            item.type = 'button';
            item.className = 'history-item';
            item.onclick = () => copyHistoryItem(entry.text);

            const textSpan = document.createElement('span');
            textSpan.className = 'history-item-text';
            textSpan.textContent = entry.text;
            item.appendChild(textSpan);

            const copyIcon = document.createElement('span');
            copyIcon.className = 'history-item-copy';
            copyIcon.innerHTML = '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
            item.appendChild(copyIcon);

            list.appendChild(item);
        });
    }

    function copyHistoryItem(text) {
        navigator.clipboard.writeText(text).then(() => {
            showToast('已複製：' + text, 'success');
        }).catch(() => {
            showToast('複製失敗', 'error');
        });
    }

    function clearHistory() {
        copyHistory = [];
        saveHistory();
        renderHistory();
        updateHistoryBadge();
        showToast('已清除複製紀錄', 'success');
    }

    // ═══════════════════════════════════════════════════
    // TOAST
    // ═══════════════════════════════════════════════════
    let toastTimer = null;
    const TOAST_MS = 2800;

    function showToast(msg, type) {
        const el = document.getElementById('toastEl');
        const inner = document.getElementById('toastInner');
        const icon = document.getElementById('toastIcon');
        const content = document.getElementById('toastContent');
        const bar = document.getElementById('toastBar');
        const isErr = type === 'error';

        inner.className = 'toast-inner ' + (isErr ? 'error' : 'success');
        icon.className = 'toast-icon ' + (isErr ? 'error' : 'success');
        bar.className = 'toast-bar ' + (isErr ? 'error' : 'success');
        icon.innerHTML = isErr
            ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>'
            : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>';

        content.textContent = msg;

        if (toastTimer) clearTimeout(toastTimer);
        bar.style.transition = 'none';
        bar.style.width = '100%';
        el.classList.add('show');
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                bar.style.transition = `width ${TOAST_MS}ms linear`;
                bar.style.width = '0%';
            });
        });
        toastTimer = setTimeout(() => el.classList.remove('show'), TOAST_MS);
    }
    // ═══════════════════════════════════════════════════════
    // PWA: SERVICE WORKER & INSTALL PROMPT
    // ═══════════════════════════════════════════════════════

    // Register Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => {
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                showToast('新版本已就緒，重新整理即可更新', 'success');
                            }
                        });
                    });
                })
                .catch(() => {
                    // SW registration failed (e.g. not HTTPS)
                });
        });
    }

    // PWA Install Prompt
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        const btn = document.getElementById('installBtn');
        if (btn) btn.classList.add('visible');
    });

    function handleInstallClick() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(result => {
            if (result.outcome === 'accepted') {
                showToast('感謝安裝！現在可以從桌面開啟', 'success');
            }
            deferredPrompt = null;
            const btn = document.getElementById('installBtn');
            if (btn) btn.classList.remove('visible');
        });
    }

    window.addEventListener('appinstalled', () => {
        deferredPrompt = null;
        const btn = document.getElementById('installBtn');
        if (btn) btn.classList.remove('visible');
    });

    // Hide install button if already in standalone mode
    if (window.matchMedia('(display-mode: standalone)').matches) {
        const btn = document.getElementById('installBtn');
        if (btn) btn.style.display = 'none';
    }
    </script>
</body>
