<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Security: Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' wasm-eval; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none';">

    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <!-- Security: Control referrer information leakage -->
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>醫事人員執業異動文字產生器</title>
    <base data-trunk-public-url />

    <!-- Trunk Asset Configurations -->
    <link data-trunk rel="copy-file" href="favicon.ico" />
    <link data-trunk rel="copy-file" href="manifest.json" />
    <link data-trunk rel="copy-file" href="sw.js" />
    <link data-trunk rel="copy-dir" href="icons" />
    <link data-trunk rel="css" href="fonts.css" />
    <link data-trunk rel="css" href="style.css" />

    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <!-- PWA: Web App Manifest -->
    <link rel="manifest" href="manifest.json">
    <!-- PWA: Theme color -->
    <meta name="theme-color" content="#0d9488">
    <!-- PWA: Apple 裝置支援 -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="異動產生器">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
