<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="醫事人員執業異動文字產生器 — 快速產生醫事人員執業登記、停業、復業、歇業等異動申請文字。">
    <title>醫事人員執業異動文字產生器</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="fonts.css">
    <style>
        /* ══════════════════════════════════════════════
           Design System — CSS Custom Properties
           ══════════════════════════════════════════════ */
        :root {
            /* Colors — Teal / Emerald palette */
            --c-primary-50:  #effefb;
            --c-primary-100: #c8fff3;
            --c-primary-200: #91fee8;
            --c-primary-300: #53f0d7;
            --c-primary-400: #20d9c2;
            --c-primary-500: #0abcaa;
            --c-primary-600: #05988c;
            --c-primary-700: #097971;
            --c-primary-800: #0c5f5b;
            --c-primary-900: #0f4f4b;

            /* Neutral — Slate */
            --c-slate-50:  #f8fafc;
            --c-slate-100: #f1f5f9;
            --c-slate-200: #e2e8f0;
            --c-slate-300: #cbd5e1;
            --c-slate-400: #94a3b8;
            --c-slate-500: #64748b;
            --c-slate-600: #475569;
            --c-slate-700: #334155;
            --c-slate-800: #1e293b;
            --c-slate-900: #0f172a;
            --c-slate-950: #020617;

            /* Semantic */
            --c-success: #22c55e;
            --c-error:   #ef4444;
            --c-warning: #f59e0b;

            /* Surfaces */
            --surface-bg: var(--c-slate-50);
            --surface-card: rgba(255, 255, 255, 0.72);
            --surface-card-border: rgba(255, 255, 255, 0.45);

            /* Typography */
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", "PingFang TC", "Heiti TC", sans-serif;

            /* Spacing */
            --space-xs: 0.25rem;
            --space-sm: 0.5rem;
            --space-md: 1rem;
            --space-lg: 1.5rem;
            --space-xl: 2rem;
            --space-2xl: 3rem;

            /* Radius */
            --radius-sm: 0.5rem;
            --radius-md: 0.75rem;
            --radius-lg: 1rem;
            --radius-xl: 1.25rem;
            --radius-full: 9999px;

            /* Shadows */
            --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.04);
            --shadow-lg: 0 12px 32px rgba(0,0,0,0.08), 0 4px 8px rgba(0,0,0,0.04);
            --shadow-xl: 0 20px 48px rgba(0,0,0,0.10), 0 8px 16px rgba(0,0,0,0.05);

            /* Transitions */
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --duration-fast: 150ms;
            --duration-normal: 250ms;
            --duration-slow: 400ms;
        }

        /* ══════════════════════════════════════════════
           Reset & Base
           ══════════════════════════════════════════════ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            line-height: 1.5;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-family);
            color: var(--c-slate-800);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: none;
            font-size: inherit;
            color: inherit;
        }

        input {
            font-family: inherit;
            border: none;
            outline: none;
            background: none;
        }

        /* ══════════════════════════════════════════════
           Animated Background
           ══════════════════════════════════════════════ */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -2;
            background: 
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(10, 188, 170, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(5, 152, 140, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(20, 215, 196, 0.04) 0%, transparent 60%),
                linear-gradient(160deg, #f0fdfa 0%, #f8fafc 30%, #f0f9ff 60%, #f5f3ff 100%);
            animation: bgShift 20s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0%   { opacity: 1; }
            50%  { opacity: 0.85; }
            100% { opacity: 1; }
        }

        /* Subtle floating orbs */
        body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(10, 188, 170, 0.06) 0%, transparent 70%);
            top: -100px;
            right: -150px;
            z-index: -1;
            animation: orbFloat 15s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes orbFloat {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-40px, 60px) scale(1.1); }
        }

        /* ══════════════════════════════════════════════
           Header
           ══════════════════════════════════════════════ */
        .app-header {
            padding: var(--space-xl) var(--space-md);
            text-align: center;
            animation: fadeSlideDown 0.6s var(--ease-out) both;
        }

        .app-header h1 {
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: 0.02em;
            background: linear-gradient(135deg, var(--c-primary-700) 0%, var(--c-primary-500) 50%, var(--c-primary-600) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .app-header .subtitle {
            font-size: 0.8rem;
            color: var(--c-slate-400);
            margin-top: 0.25rem;
            font-weight: 400;
        }

        @media (min-width: 640px) {
            .app-header h1 { font-size: 1.6rem; }
            .app-header .subtitle { font-size: 0.85rem; }
        }

        /* ══════════════════════════════════════════════
           Main Layout
           ══════════════════════════════════════════════ */
        .app-main {
            flex: 1;
            max-width: 52rem;
            width: 100%;
            margin: 0 auto;
            padding: 0 var(--space-md) var(--space-2xl);
        }

        /* ══════════════════════════════════════════════
           Glassmorphism Card
           ══════════════════════════════════════════════ */
        .glass-card {
            background: var(--surface-card);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border: 1px solid var(--surface-card-border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.6);
            padding: var(--space-lg);
            animation: cardEnter 0.7s var(--ease-out) 0.1s both;
        }

        @media (min-width: 640px) {
            .glass-card { padding: var(--space-xl) var(--space-2xl); }
        }

        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(24px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ══════════════════════════════════════════════
           Step Sections & Progress
           ══════════════════════════════════════════════ */
        .steps-container {
            display: flex;
            flex-direction: column;
            gap: var(--space-xl);
            position: relative;
        }

        /* Vertical progress rail */
        .steps-container::before {
            content: '';
            position: absolute;
            left: 13px;
            top: 32px;
            bottom: 32px;
            width: 2px;
            background: var(--c-slate-200);
            border-radius: 1px;
            z-index: 0;
        }

        .step-progress-fill {
            position: absolute;
            left: 13px;
            top: 32px;
            width: 2px;
            background: linear-gradient(180deg, var(--c-primary-400), var(--c-primary-600));
            border-radius: 1px;
            z-index: 1;
            transition: height var(--duration-slow) var(--ease-out);
            box-shadow: 0 0 8px rgba(10, 188, 170, 0.3);
        }

        .step-section {
            position: relative;
            z-index: 2;
            opacity: 0;
            animation: stepFadeIn 0.5s var(--ease-out) both;
        }

        .step-section:nth-child(2) { animation-delay: 0.15s; }
        .step-section:nth-child(3) { animation-delay: 0.25s; }
        .step-section:nth-child(4) { animation-delay: 0.35s; }
        .step-section:nth-child(5) { animation-delay: 0.45s; }

        @keyframes stepFadeIn {
            from { opacity: 0; transform: translateX(-8px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .step-header {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            margin-bottom: 0.75rem;
        }

        .step-badge {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            flex-shrink: 0;
            transition: all var(--duration-normal) var(--ease-out);
            position: relative;
        }

        .step-badge.inactive {
            background: var(--c-slate-100);
            color: var(--c-slate-400);
            border: 2px solid var(--c-slate-200);
        }

        .step-badge.active {
            background: linear-gradient(135deg, var(--c-primary-500), var(--c-primary-600));
            color: white;
            border: 2px solid transparent;
            box-shadow: 0 0 0 3px rgba(10, 188, 170, 0.15), 0 2px 8px rgba(10, 188, 170, 0.25);
        }

        .step-badge.completed {
            background: linear-gradient(135deg, var(--c-primary-500), var(--c-primary-600));
            color: white;
            border: 2px solid transparent;
            box-shadow: 0 0 0 3px rgba(10, 188, 170, 0.15);
        }

        .step-badge.completed::after {
            content: '✓';
            position: absolute;
            font-size: 0.7rem;
            font-weight: 900;
        }

        .step-badge.completed span { visibility: hidden; }

        .step-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--c-slate-700);
            letter-spacing: 0.01em;
        }

        .step-hint {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--c-primary-600);
            background: var(--c-primary-50);
            padding: 0.15rem 0.5rem;
            border-radius: var(--radius-full);
            margin-left: 0.35rem;
        }

        .step-content {
            padding-left: calc(28px + 0.65rem);
        }

        /* ══════════════════════════════════════════════
           Step 1 — Name Input
           ══════════════════════════════════════════════ */
        .name-input-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-field {
            width: 100%;
            padding: 0.75rem 1rem;
            padding-right: 2.5rem;
            font-size: 0.9rem;
            color: var(--c-slate-800);
            background: white;
            border: 1.5px solid var(--c-slate-200);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-xs), inset 0 1px 3px rgba(0,0,0,0.03);
            transition: all var(--duration-normal) var(--ease-out);
        }

        .input-field::placeholder {
            color: var(--c-slate-400);
            font-weight: 400;
        }

        .input-field:hover {
            border-color: var(--c-slate-300);
        }

        .input-field:focus {
            border-color: var(--c-primary-400);
            box-shadow: 0 0 0 3px rgba(10, 188, 170, 0.1), var(--shadow-xs), inset 0 1px 3px rgba(0,0,0,0.03);
        }

        .input-check {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%) scale(0);
            color: var(--c-success);
            transition: transform var(--duration-normal) var(--ease-bounce);
            pointer-events: none;
        }

        .input-check.visible {
            transform: translateY(-50%) scale(1);
        }

        .reset-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.5rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--c-slate-400);
            border-radius: var(--radius-sm);
            transition: all var(--duration-normal) var(--ease-out);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .reset-btn:hover {
            color: var(--c-primary-600);
            background: var(--c-primary-50);
        }

        .reset-btn:hover .reset-icon {
            transform: rotate(-180deg);
        }

        .reset-icon {
            width: 14px;
            height: 14px;
            transition: transform var(--duration-slow) var(--ease-out);
        }

        /* ══════════════════════════════════════════════
           Step 2 — Category Tabs + Grid
           ══════════════════════════════════════════════ */
        .category-tabs {
            display: flex;
            gap: 0.3rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            scrollbar-width: none;
            -ms-overflow-style: none;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .category-tabs::-webkit-scrollbar { display: none; }

        .category-tab {
            flex-shrink: 0;
            padding: 0.4rem 0.9rem;
            border-radius: var(--radius-full);
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            border: 1.5px solid var(--c-slate-200);
            background: white;
            color: var(--c-slate-500);
            transition: all var(--duration-fast) var(--ease-out);
            white-space: nowrap;
            scroll-snap-align: start;
            position: relative;
        }

        .category-tab:hover {
            border-color: var(--c-primary-300);
            color: var(--c-primary-600);
            background: var(--c-primary-50);
        }

        .category-tab.active {
            background: linear-gradient(135deg, var(--c-primary-500), var(--c-primary-600));
            color: white;
            border-color: transparent;
            box-shadow: 0 2px 8px rgba(10, 188, 170, 0.3);
        }

        .category-panel {
            background: linear-gradient(135deg, var(--c-slate-50) 0%, rgba(240, 253, 250, 0.5) 100%);
            padding: 0.85rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--c-slate-100);
            animation: panelFade 0.25s var(--ease-out);
        }

        @keyframes panelFade {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.45rem;
        }

        @media (min-width: 640px) {
            .category-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 768px) {
            .category-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .cat-btn {
            padding: 0.6rem 0.5rem;
            border-radius: var(--radius-md);
            border: 1.5px solid var(--c-slate-200);
            background: white;
            color: var(--c-slate-600);
            font-size: 0.82rem;
            font-weight: 500;
            text-align: center;
            transition: all var(--duration-fast) var(--ease-out);
            cursor: pointer;
            box-shadow: var(--shadow-xs);
            position: relative;
            overflow: hidden;
        }

        .cat-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(10, 188, 170, 0.04) 0%, transparent 100%);
            opacity: 0;
            transition: opacity var(--duration-fast);
        }

        .cat-btn:hover {
            border-color: var(--c-primary-300);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .cat-btn:hover::before { opacity: 1; }

        .cat-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .cat-btn.selected {
            border-color: var(--c-primary-500);
            background: linear-gradient(135deg, var(--c-primary-50) 0%, rgba(200, 255, 243, 0.5) 100%);
            color: var(--c-primary-800);
            font-weight: 700;
            box-shadow: 0 0 0 2.5px rgba(10, 188, 170, 0.12), var(--shadow-sm);
        }

        /* ══════════════════════════════════════════════
           Step 3 — Application Items (Chips)
           ══════════════════════════════════════════════ */
        .items-header-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .selected-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
            padding: 0 0.35rem;
            border-radius: var(--radius-full);
            background: var(--c-primary-500);
            color: white;
            font-size: 0.65rem;
            font-weight: 700;
            transition: all var(--duration-normal) var(--ease-bounce);
            transform: scale(0);
        }

        .selected-count.visible {
            transform: scale(1);
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.45rem;
        }

        @media (min-width: 640px) {
            .items-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .item-chip {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.65rem 0.6rem;
            border-radius: var(--radius-md);
            border: 1.5px solid var(--c-slate-200);
            background: white;
            color: var(--c-slate-600);
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-out);
            box-shadow: var(--shadow-xs);
            position: relative;
            overflow: hidden;
            user-select: none;
        }

        .item-chip:hover {
            border-color: var(--c-slate-300);
            background: var(--c-slate-50);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .item-chip:active {
            transform: translateY(0) scale(0.97);
        }

        .item-chip.selected {
            border-color: var(--c-primary-500);
            background: linear-gradient(135deg, var(--c-primary-50) 0%, rgba(200, 255, 243, 0.4) 100%);
            color: var(--c-primary-800);
            font-weight: 700;
            box-shadow: 0 0 0 2.5px rgba(10, 188, 170, 0.12), var(--shadow-sm);
        }

        .item-chip.selected .chip-check {
            transform: scale(1);
            opacity: 1;
        }

        .chip-check {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--c-primary-500);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: scale(0);
            opacity: 0;
            transition: all var(--duration-normal) var(--ease-bounce);
            flex-shrink: 0;
        }

        .chip-check svg {
            width: 10px;
            height: 10px;
        }

        /* ══════════════════════════════════════════════
           Step 4 — Output Card
           ══════════════════════════════════════════════ */
        .output-card {
            position: relative;
            border-radius: var(--radius-lg);
            padding: 2px; /* border thickness */
            background: conic-gradient(
                from 0deg,
                var(--c-primary-400),
                var(--c-primary-600),
                var(--c-slate-700),
                var(--c-primary-800),
                var(--c-primary-400)
            );
            background-size: 100% 100%;
            animation: borderRotate 6s linear infinite;
            box-shadow: var(--shadow-lg);
        }

        @keyframes borderRotate {
            to { filter: hue-rotate(15deg); }
        }

        @property --gradient-angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        .output-inner {
            background: var(--c-slate-900);
            border-radius: calc(var(--radius-lg) - 2px);
            padding: var(--space-lg);
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 640px) {
            .output-inner {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
        }

        /* Decorative orb */
        .output-inner::before {
            content: '';
            position: absolute;
            top: -30px;
            right: -30px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(10, 188, 170, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .output-text {
            flex: 1;
            text-align: center;
            word-break: break-all;
            min-height: 1.75rem;
        }

        @media (min-width: 640px) {
            .output-text { text-align: left; }
        }

        #outputResult {
            color: var(--c-primary-300);
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: 0.02em;
            line-height: 1.6;
            transition: opacity var(--duration-normal);
        }

        @media (min-width: 640px) {
            #outputResult { font-size: 1.2rem; }
        }

        .copy-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.7rem 1.25rem;
            background: linear-gradient(135deg, var(--c-primary-500), var(--c-primary-600));
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: var(--radius-sm);
            transition: all var(--duration-fast) var(--ease-out);
            white-space: nowrap;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(10, 188, 170, 0.3);
        }

        .copy-btn:hover {
            background: linear-gradient(135deg, var(--c-primary-400), var(--c-primary-500));
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(10, 188, 170, 0.35);
        }

        .copy-btn:active {
            transform: translateY(0) scale(0.97);
        }

        /* Ripple effect */
        .copy-btn .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: scale(0);
            animation: rippleAnim 0.5s ease-out;
            pointer-events: none;
        }

        @keyframes rippleAnim {
            to { transform: scale(3); opacity: 0; }
        }

        .copy-btn .btn-icon {
            width: 16px;
            height: 16px;
            transition: all var(--duration-normal) var(--ease-out);
        }

        /* ══════════════════════════════════════════════
           Toast Notification
           ══════════════════════════════════════════════ */
        .toast {
            position: fixed;
            top: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(-120%);
            z-index: 9999;
            max-width: 90vw;
            pointer-events: none;
            transition: transform var(--duration-slow) var(--ease-out), opacity var(--duration-slow) var(--ease-out);
            opacity: 0;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .toast-body {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.7rem 1.25rem;
            border-radius: var(--radius-lg);
            font-size: 0.85rem;
            font-weight: 500;
            box-shadow: var(--shadow-xl);
            position: relative;
            overflow: hidden;
        }

        .toast-body.success {
            background: var(--c-slate-900);
            color: white;
            border: 1px solid var(--c-slate-700);
        }

        .toast-body.error {
            background: #1c1012;
            color: #fecaca;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .toast-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .toast-icon.success { color: var(--c-success); }
        .toast-icon.error   { color: var(--c-error); }

        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
            transition: width linear;
        }

        .toast-progress.success { background: var(--c-primary-400); }
        .toast-progress.error   { background: var(--c-error); }

        /* ══════════════════════════════════════════════
           Footer
           ══════════════════════════════════════════════ */
        .app-footer {
            text-align: center;
            padding: var(--space-lg) var(--space-md);
            font-size: 0.72rem;
            color: var(--c-slate-400);
            animation: fadeSlideDown 0.6s var(--ease-out) 0.6s both;
        }

        .app-footer span {
            opacity: 0.7;
        }

        /* ══════════════════════════════════════════════
           Animations
           ══════════════════════════════════════════════ */
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Focus visible for keyboard navigation */
        :focus-visible {
            outline: 2px solid var(--c-primary-400);
            outline-offset: 2px;
        }

        button:focus:not(:focus-visible),
        input:focus:not(:focus-visible) {
            outline: none;
        }

        /* ══════════════════════════════════════════════
           Mobile-specific adjustments
           ══════════════════════════════════════════════ */
        @media (max-width: 639px) {
            .step-content { padding-left: 0; margin-top: 0.35rem; }
            .steps-container::before,
            .step-progress-fill { display: none; }
            .glass-card { padding: var(--space-md); }
            .app-header { padding: var(--space-lg) var(--space-md) var(--space-md); }
            .copy-btn { width: 100%; }
        }
    </style>
</head>
<body>

    <header class="app-header">
        <h1>醫事人員執業異動文字產生器</h1>
        <p class="subtitle">快速產生執業登記異動申請文字</p>
    </header>

    <main class="app-main">
        <div class="glass-card">
            <div class="steps-container">
                <!-- Progress fill line -->
                <div class="step-progress-fill" id="progressFill"></div>

                <!-- Step 1: 姓名輸入 -->
                <section class="step-section" aria-label="步驟一：輸入申請人姓名">
                    <div class="step-header">
                        <div class="step-badge inactive" id="badge1"><span>1</span></div>
                        <span class="step-title">輸入申請人姓名</span>
                    </div>
                    <div class="step-content">
                        <div class="name-input-row">
                            <div class="input-wrapper">
                                <input type="text" id="applicantName"
                                    class="input-field"
                                    placeholder="請輸入姓名（例如：陳小明）"
                                    autocomplete="off"
                                    aria-label="申請人姓名"
                                    oninput="handleNameInput()">
                                <div class="input-check" id="nameCheck">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M5 13l4 4L19 7"/>
                                    </svg>
                                </div>
                            </div>
                            <button type="button" class="reset-btn" onclick="resetAll()" aria-label="清除所有選擇並重新填寫">
                                <svg class="reset-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                                </svg>
                                清除重填
                            </button>
                        </div>
                    </div>
                </section>

                <!-- Step 2: 選擇申請類別 -->
                <section class="step-section" aria-label="步驟二：選擇申請類別">
                    <div class="step-header">
                        <div class="step-badge inactive" id="badge2"><span>2</span></div>
                        <span class="step-title">選擇申請類別</span>
                        <span class="step-hint">單選</span>
                    </div>
                    <div class="step-content">
                        <div id="categoryContainer"></div>
                    </div>
                </section>

                <!-- Step 3: 選擇申請項目 -->
                <section class="step-section" aria-label="步驟三：選擇申請項目">
                    <div class="step-header items-header-row">
                        <div class="step-badge inactive" id="badge3"><span>3</span></div>
                        <span class="step-title">選擇申請項目</span>
                        <span class="step-hint">可複選</span>
                        <span class="selected-count" id="selectedCount">0</span>
                    </div>
                    <div class="step-content">
                        <div class="items-grid" id="itemGrid"></div>
                    </div>
                </section>

                <!-- Step 4: 產生結果 -->
                <section class="step-section" aria-label="步驟四：產生組合文字結果">
                    <div class="step-header">
                        <div class="step-badge inactive" id="badge4"><span>4</span></div>
                        <span class="step-title">產生組合文字結果</span>
                    </div>
                    <div class="step-content">
                        <div class="output-card">
                            <div class="output-inner">
                                <div class="output-text">
                                    <p id="outputResult"></p>
                                </div>
                                <button class="copy-btn" onclick="copyGeneratedText()" aria-label="複製產生的文字">
                                    <svg class="btn-icon" id="copyIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
                                    </svg>
                                    <span id="copyBtnText">一鍵複製文字</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- Toast notification -->
    <div class="toast" id="toastMessage" role="alert" aria-live="polite">
        <div class="toast-body success" id="toastBody">
            <svg class="toast-icon success" id="toastIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
            </svg>
            <span id="toastContent">已複製！</span>
            <div class="toast-progress success" id="toastProgress"></div>
        </div>
    </div>

    <footer class="app-footer">
        <span>醫事人員執業異動文字產生器</span>
    </footer>

    <script>
        // ══════════════════════════════════════════════
        // Data — 醫事人員類別清單
        // ══════════════════════════════════════════════
        const categories = [
            { id: 'physician', label: '醫師', group: '醫師類' },
            { id: 'tcm_physician', label: '中醫師', group: '醫師類' },
            { id: 'dentist', label: '牙醫師', group: '醫師類' },
            { id: 'nurse', label: '護理師(護士)', group: '護理與助產類' },
            { id: 'midwife', label: '助產師(士)', group: '護理與助產類' },
            { id: 'pharmacist', label: '藥師', group: '藥事類' },
            { id: 'assistant_pharmacist', label: '藥劑生', group: '藥事類' },
            { id: 'medical_technologist', label: '醫事檢驗師(生)', group: '醫事技術類' },
            { id: 'medical_radiation', label: '醫事放射師(士)', group: '醫事技術類' },
            { id: 'dental_technologist', label: '牙體技術師(生)', group: '醫事技術類' },
            { id: 'optometrist', label: '驗光師(生)', group: '醫事技術類' },
            { id: 'physical_therapist', label: '物理治療師(生)', group: '復健與治療類' },
            { id: 'occupational_therapist', label: '職能治療師(生)', group: '復健與治療類' },
            { id: 'speech_therapist', label: '語言治療師', group: '復健與治療類' },
            { id: 'audiologist', label: '聽力師', group: '復健與治療類' },
            { id: 'respiratory_therapist', label: '呼吸治療師', group: '復健與治療類' },
            { id: 'clinical_psychologist', label: '臨床心理師', group: '心理類' },
            { id: 'counseling_psychologist', label: '諮商心理師', group: '心理類' },
            { id: 'nutritionist', label: '營養師', group: '藥事類' },
            { id: 'other', label: '其他', group: '其他專業類' }
        ];

        // 申請項目清單
        const items = [
            { id: 'register', label: '執業(現歇業)登記' },
            { id: 'suspend', label: '停業登記' },
            { id: 'resume', label: '復業(現停業)登記' },
            { id: 'cessation', label: '歇業(離職)登記' },
            { id: 'dept_change', label: '(科別)變更' },
            { id: 'name_change', label: '(姓名)變更' },
            { id: 'inst_change', label: '機構變更' },
            { id: 'cat_change', label: '類別變更' },
            { id: 'lost_reissue', label: '遺失補發' },
            { id: 'damage_reissue', label: '損壞補發' },
            { id: 'renew', label: '到期換發' }
        ];

        // ══════════════════════════════════════════════
        // State
        // ══════════════════════════════════════════════
        let selectedCategory = '';
        let selectedItems = [];
        let selectedGroupTab = '';

        // ══════════════════════════════════════════════
        // Initialization
        // ══════════════════════════════════════════════
        window.onload = function() {
            renderCategories();
            renderItems();
            updateGenerator();
            updateStepBadges();
        };

        // ══════════════════════════════════════════════
        // Step Progress
        // ══════════════════════════════════════════════
        function updateStepBadges() {
            const name = document.getElementById('applicantName').value.trim();
            const nameCheck = document.getElementById('nameCheck');

            // Step 1: Name
            const b1 = document.getElementById('badge1');
            if (name) {
                b1.className = 'step-badge completed';
                nameCheck.classList.add('visible');
            } else {
                b1.className = 'step-badge active';
                nameCheck.classList.remove('visible');
            }

            // Step 2: Category
            const b2 = document.getElementById('badge2');
            if (selectedCategory) {
                b2.className = 'step-badge completed';
            } else if (name) {
                b2.className = 'step-badge active';
            } else {
                b2.className = 'step-badge inactive';
            }

            // Step 3: Items
            const b3 = document.getElementById('badge3');
            if (selectedItems.length > 0) {
                b3.className = 'step-badge completed';
            } else if (selectedCategory) {
                b3.className = 'step-badge active';
            } else {
                b3.className = 'step-badge inactive';
            }

            // Step 4: Result
            const b4 = document.getElementById('badge4');
            if (name && selectedCategory && selectedItems.length > 0) {
                b4.className = 'step-badge active';
            } else {
                b4.className = 'step-badge inactive';
            }

            // Update selected count badge
            const countEl = document.getElementById('selectedCount');
            countEl.textContent = selectedItems.length;
            if (selectedItems.length > 0) {
                countEl.classList.add('visible');
            } else {
                countEl.classList.remove('visible');
            }

            // Update progress fill line
            updateProgressFill(name);
        }

        function updateProgressFill(name) {
            const fill = document.getElementById('progressFill');
            if (!fill) return;

            let progress = 0;
            if (name) progress = 1;
            if (selectedCategory) progress = 2;
            if (selectedItems.length > 0) progress = 3;

            // Map progress to percentage of the rail height
            const percentages = [0, 25, 55, 90];
            fill.style.height = percentages[progress] + '%';
        }

        // ══════════════════════════════════════════════
        // Render Categories
        // ══════════════════════════════════════════════
        function renderCategories() {
            const container = document.getElementById('categoryContainer');
            container.innerHTML = '';

            // Group by 'group' attribute, preserving order
            const groupOrder = [];
            const groups = {};
            categories.forEach(cat => {
                if (!groups[cat.group]) {
                    groups[cat.group] = [];
                    groupOrder.push(cat.group);
                }
                groups[cat.group].push(cat);
            });

            // Default tab
            if (!selectedGroupTab) {
                if (selectedCategory) {
                    const selectedCat = categories.find(c => c.id === selectedCategory);
                    if (selectedCat) selectedGroupTab = selectedCat.group;
                }
                if (!selectedGroupTab) {
                    selectedGroupTab = '全部';
                }
            }

            // Build tab row
            const tabRow = document.createElement('div');
            tabRow.className = 'category-tabs';

            // "All" tab
            const allTab = document.createElement('button');
            allTab.type = 'button';
            allTab.className = `category-tab${selectedGroupTab === '全部' ? ' active' : ''}`;
            allTab.textContent = '全部';
            allTab.setAttribute('aria-label', '顯示全部類別');
            allTab.onclick = () => {
                selectedGroupTab = '全部';
                renderCategories();
            };
            tabRow.appendChild(allTab);

            groupOrder.forEach(groupName => {
                const tab = document.createElement('button');
                tab.type = 'button';
                tab.className = `category-tab${selectedGroupTab === groupName ? ' active' : ''}`;
                tab.textContent = groupName;
                tab.setAttribute('aria-label', `顯示${groupName}類別`);
                tab.onclick = () => {
                    selectedGroupTab = groupName;
                    renderCategories();
                };
                tabRow.appendChild(tab);
            });
            container.appendChild(tabRow);

            // Build panel
            const panel = document.createElement('div');
            panel.className = 'category-panel';

            const grid = document.createElement('div');
            grid.className = 'category-grid';

            const displayCategories = selectedGroupTab === '全部' ? categories : (groups[selectedGroupTab] || []);

            displayCategories.forEach(cat => {
                const isSelected = selectedCategory === cat.id;
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = `cat-btn${isSelected ? ' selected' : ''}`;
                btn.setAttribute('aria-pressed', isSelected ? 'true' : 'false');
                btn.setAttribute('aria-label', `選擇類別：${cat.label}`);
                btn.onclick = () => {
                    selectedCategory = cat.id;
                    selectedItems = [];
                    renderCategories();
                    renderItems();
                    updateGenerator();
                    updateStepBadges();
                };
                btn.innerText = cat.label;
                grid.appendChild(btn);
            });

            panel.appendChild(grid);
            container.appendChild(panel);
        }

        // ══════════════════════════════════════════════
        // Render Items
        // ══════════════════════════════════════════════
        function renderItems() {
            const grid = document.getElementById('itemGrid');
            grid.innerHTML = '';

            items.forEach(item => {
                const isSelected = selectedItems.includes(item.id);
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = `item-chip${isSelected ? ' selected' : ''}`;
                btn.setAttribute('aria-pressed', isSelected ? 'true' : 'false');
                btn.setAttribute('aria-label', `${isSelected ? '取消選擇' : '選擇'}申請項目：${item.label}`);
                btn.onclick = () => {
                    toggleItemSelection(item.id);
                };

                if (isSelected) {
                    btn.innerHTML = `
                        <span class="chip-check">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                            </svg>
                        </span>
                        <span>${item.label}</span>
                    `;
                } else {
                    btn.innerText = item.label;
                }

                grid.appendChild(btn);
            });
        }

        // ══════════════════════════════════════════════
        // Selection Logic
        // ══════════════════════════════════════════════
        function toggleItemSelection(id) {
            const index = selectedItems.indexOf(id);
            if (index > -1) {
                selectedItems.splice(index, 1);
            } else {
                selectedItems.push(id);
            }
            renderItems();
            updateGenerator();
            updateStepBadges();
        }

        function handleNameInput() {
            updateGenerator();
            updateStepBadges();
        }

        function resetAll() {
            document.getElementById('applicantName').value = '';
            selectedCategory = '';
            selectedItems = [];
            selectedGroupTab = '';
            renderCategories();
            renderItems();
            updateGenerator();
            updateStepBadges();
            document.getElementById('applicantName').focus();
        }

        // ══════════════════════════════════════════════
        // Text Generation
        // ══════════════════════════════════════════════
        function cleanParentheses(text) {
            if (!text) return '';

            // 針對特殊項目，將括號轉化為適合閱讀的格式（不直接刪除）
            if (text.includes('(科別)') || text.includes('（科別）')) {
                return '科別變更';
            }
            if (text.includes('(姓名)') || text.includes('（姓名）')) {
                return '姓名變更';
            }

            // 其他一般項目，移除括號及裡面的所有補充文字
            return text.replace(/[\(（].*?[\)）]/g, '');
        }

        function updateGenerator() {
            const rawName = document.getElementById('applicantName').value.trim();
            const displayName = rawName || '（請輸入姓名）';

            // 處理類別
            const categoryObj = categories.find(c => c.id === selectedCategory);
            const cleanedCategory = categoryObj ? cleanParentheses(categoryObj.label) : '（請選擇類別）';

            // 處理複選項目並用「、」連接
            const cleanedItemsArray = selectedItems.map(itemId => {
                const itemObj = items.find(i => i.id === itemId);
                return itemObj ? cleanParentheses(itemObj.label) : '';
            }).filter(Boolean);

            const itemsText = cleanedItemsArray.length > 0 ? cleanedItemsArray.join('、') : '（請選擇項目）';

            // 產生格式： [姓名] 申辦 [申請類別] [申請項目1、項目2]
            const generatedString = `${displayName}申辦${cleanedCategory}${itemsText}`;
            document.getElementById('outputResult').innerText = generatedString;
        }

        // ══════════════════════════════════════════════
        // Copy to Clipboard
        // ══════════════════════════════════════════════
        function copyGeneratedText() {
            const rawName = document.getElementById('applicantName').value.trim();
            if (!rawName) {
                showToast('請先輸入上方申請人姓名', 'error');
                return;
            }
            if (!selectedCategory) {
                showToast('請先選擇申請類別', 'error');
                return;
            }
            if (selectedItems.length === 0) {
                showToast('請至少選擇一個申請項目', 'error');
                return;
            }

            const textToCopy = document.getElementById('outputResult').innerText;
            navigator.clipboard.writeText(textToCopy).then(() => {
                showToast('已複製：' + textToCopy, 'success');
                morphCopyButton();
            }).catch(() => {
                showToast('複製失敗，請手動選取複製', 'error');
            });
        }

        // Morph copy button icon to checkmark briefly
        function morphCopyButton() {
            const icon = document.getElementById('copyIcon');
            const text = document.getElementById('copyBtnText');
            const originalIcon = icon.innerHTML;
            const originalText = text.textContent;

            icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>';
            text.textContent = '已複製！';

            setTimeout(() => {
                icon.innerHTML = originalIcon;
                text.textContent = originalText;
            }, 1800);
        }

        // Ripple effect on copy button
        document.addEventListener('click', function(e) {
            const btn = e.target.closest('.copy-btn');
            if (!btn) return;

            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
            btn.appendChild(ripple);
            ripple.addEventListener('animationend', () => ripple.remove());
        });

        // ══════════════════════════════════════════════
        // Toast Notifications
        // ══════════════════════════════════════════════
        let toastTimeout = null;
        let toastProgressTimeout = null;
        const TOAST_DURATION = 2800;

        function showToast(message, type) {
            const toast = document.getElementById('toastMessage');
            const body = document.getElementById('toastBody');
            const content = document.getElementById('toastContent');
            const icon = document.getElementById('toastIcon');
            const progress = document.getElementById('toastProgress');

            // Set type styling
            const isError = type === 'error';
            body.className = `toast-body ${isError ? 'error' : 'success'}`;
            icon.className = `toast-icon ${isError ? 'error' : 'success'}`;
            progress.className = `toast-progress ${isError ? 'error' : 'success'}`;

            // Set icon
            if (isError) {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>';
            } else {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>';
            }

            content.textContent = message;

            // Clear previous timers
            if (toastTimeout) clearTimeout(toastTimeout);
            if (toastProgressTimeout) clearTimeout(toastProgressTimeout);

            // Reset progress bar
            progress.style.transition = 'none';
            progress.style.width = '100%';

            // Show toast
            toast.classList.add('show');

            // Animate progress bar
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    progress.style.transition = `width ${TOAST_DURATION}ms linear`;
                    progress.style.width = '0%';
                });
            });

            // Hide after duration
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, TOAST_DURATION);
        }
    </script>
</body>
</html>
